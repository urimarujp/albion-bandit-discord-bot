name: Bandit Alert

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
    # - cron: "45 1,4,6,8,12,14,16,18 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm install
      - run: node index.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
