name: Albion Bandit Bot (external cron)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why triggered"
        required: false
        default: "external-cron"

permissions:
  contents: read

# ✅ 二重起動（リトライ等）で二重通知になるのを抑止
concurrency:
  group: albion-bandit
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # ✅ npm依存をキャッシュして安定＆高速化
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run bot (send Discord)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ROLE_ID: ${{ secrets.ROLE_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node index.js
